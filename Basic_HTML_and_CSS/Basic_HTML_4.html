<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic_HTML_4</title>
</head>
<body>
    <style>
        .font_1 {
            background-color: black;
            color: yellow;
            font-size: large;
        }
        .font_2 {
            background-color: darkblue;
            color: white;
            font-size: medium;
        }
        .my_style {
            background-color: blue;
            color: yellow;
            font-size: small;
            font-weight: bold;
            text-decoration: dashed;
        }
    </style>
    <h2 class="font_1">This h2 element is styled per class attribute font_1</h2>
    <h3 class="font_2">This h3 element is styled per class attribute font_2</h3>
    <h4 class="font_1">This h4 element is styled per class attribute font_1</h4>
    <p class="my_style">This p element is using my style class</p>
</body>
</html>
